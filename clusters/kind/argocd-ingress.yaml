# =============================================================================
# Ingress resource for argocd-server.
#
# Kept as a standalone manifest (not generated by the argo-cd Helm chart)
# so that:
#   - Chart upgrades don't silently rewrite our annotations.
#   - The Ingress is visible as a first-class K8s resource — you can read
#     exactly how traffic enters without spelunking through Helm templates.
#
# TLS: `tls[0].secretName: argocd-server-tls` points at a Secret created by
# the Makefile's `argocd-tls` target — a self-signed cert for
# argocd.localtest.me valid for 365 days. Browsers will show a cert warning
# (it's self-signed, not from a public CA) but TLS handshakes succeed.
# Phase 4 replaces this with a cert-manager ClusterIssuer + Certificate
# resource so the Secret is reissued automatically.
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: platform
  annotations:
    # Argo CD's server runs plain HTTP (server.insecure=true in values).
    # This annotation tells ingress-nginx not to speak HTTPS upstream.
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    # We DON'T force an ssl-redirect because HTTPS lives on :8443 on the
    # Mac (Docker Desktop TLS-on-:443 workaround — see kind.yaml). A default
    # redirect would send the browser to https://argocd.localtest.me/
    # (implicit :443) which is unmapped. Users access :8443 explicitly.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.localtest.me
      # Secret is created by `make argocd-tls` (a one-time openssl-generated
      # self-signed cert). Phase 4 replaces this with cert-manager-issued
      # certs that rotate automatically.
      secretName: argocd-server-tls
  rules:
    - host: argocd.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                # Service port 80 = argocd-server's --insecure HTTP port.
                # (Port 443 would be its HTTPS port, disabled by our values.)
                port:
                  number: 80
